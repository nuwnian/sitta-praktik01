<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stok Bahan Ajar — SITTA</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand"><span class="brand-mark">SITTA</span> Universitas Terbuka</div>
    <div class="navbar-user">
      <span id="navUser">—</span>
      <button class="btn-logout" onclick="logout()"><i class="ti ti-logout"></i> Keluar</button>
    </div>
  </nav>

  <div class="container">
    <div class="back-link" onclick="location.href='dashboard.html'">
      <i class="ti ti-arrow-left"></i> Dashboard
    </div>

    <div class="page-header">
      <h1><i class="ti ti-books" style="color:var(--navy-mid);"></i> Stok Bahan Ajar</h1>
      <p>Data ketersediaan modul kuliah Universitas Terbuka</p>
    </div>

    <!-- Tambah Form -->
    <div class="card" style="margin-bottom:20px;">
      <div class="card-title"><i class="ti ti-circle-plus"></i> Tambah Bahan Ajar</div>
      <div style="display:grid;grid-template-columns:110px 110px 1fr 80px 80px;gap:10px;align-items:end;">
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Kode Lokasi</label>
          <input class="form-input" type="text" id="inputKodeLokasi" placeholder="0JKT01" />
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Kode Barang</label>
          <input class="form-input" type="text" id="inputKodeBarang" placeholder="EKMA4216" />
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Nama Barang</label>
          <input class="form-input" type="text" id="inputNama" placeholder="Nama modul" />
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Edisi</label>
          <input class="form-input" type="text" id="inputEdisi" placeholder="1" />
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Stok</label>
          <input class="form-input" type="number" id="inputStok" min="0" placeholder="0" />
        </div>
      </div>
      <div style="margin-top:12px;display:flex;gap:8px;">
        <button class="btn btn-primary" onclick="tambahBahan()"><i class="ti ti-device-floppy"></i> Simpan</button>
        <button class="btn btn-outline" onclick="resetForm()"><i class="ti ti-eraser"></i> Reset</button>
      </div>
      <div class="alert" id="alertForm" style="margin-top:12px;margin-bottom:0;"></div>
    </div>

    <!-- Filter -->
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
      <div class="input-icon-wrap" style="flex:1;min-width:180px;">
        <i class="ti ti-search input-icon"></i>
        <input class="form-input has-icon" type="text" id="searchInput" placeholder="Cari nama atau kode..." oninput="renderTable()" />
      </div>
      <select class="form-input" id="filterJenis" style="width:auto;" onchange="renderTable()">
        <option value="">Semua Jenis</option>
        <option value="BMP">BMP</option>
        <option value="Suplemen">Suplemen</option>
      </select>
    </div>

    <!-- Table -->
    <div class="card" style="padding:0;overflow:hidden;">
      <div style="padding:16px 20px 0;display:flex;align-items:center;justify-content:space-between;">
        <div class="card-title" style="margin-bottom:0;border-bottom:none;padding-bottom:0;">
          <i class="ti ti-table"></i> Daftar Bahan Ajar
        </div>
        <span id="totalCount" style="font-size:0.72rem;color:var(--text-muted);font-family:var(--mono);"></span>
      </div>
      <div style="height:1px;background:var(--border);margin:12px 0;"></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Cover</th>
              <th>Kode Barang</th>
              <th>Nama Barang</th>
              <th>Jenis</th>
              <th>Edisi</th>
              <th>Lokasi</th>
              <th style="text-align:center;">Stok</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        <div id="emptyState" class="empty-state" style="display:none;">
          <i class="ti ti-search-off empty-icon"></i>
          Tidak ada data yang cocok.
        </div>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script>
    const userStr = sessionStorage.getItem('user');
    if (!userStr) location.href = 'index.html';
    document.getElementById('navUser').textContent = JSON.parse(userStr).nama;

    let bahanAjarList = [...dataBahanAjar];

    function getStatus(stok) {
      if (stok === 0) return { label: 'Habis', cls: 'badge-danger' };
      if (stok <= 50) return { label: 'Terbatas', cls: 'badge-warning' };
      return { label: 'Tersedia', cls: 'badge-success' };
    }

    function renderTable() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const filter = document.getElementById('filterJenis').value;
      const tbody = document.getElementById('tableBody');
      const empty = document.getElementById('emptyState');

      const filtered = bahanAjarList.filter(b =>
        (b.namaBarang.toLowerCase().includes(search) || b.kodeBarang.toLowerCase().includes(search)) &&
        (!filter || b.jenisBarang === filter)
      );

      document.getElementById('totalCount').textContent = `${filtered.length} / ${bahanAjarList.length}`;

      if (!filtered.length) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
      empty.style.display = 'none';

      tbody.innerHTML = filtered.map(b => {
        const st = getStatus(b.stok);
        const ri = bahanAjarList.indexOf(b);
        const coverHtml = b.cover
          ? `<img src="${b.cover}" alt="${b.namaBarang}" style="width:36px;height:50px;object-fit:cover;border:1px solid var(--border);display:block;" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" /><div style="display:none;width:36px;height:50px;background:var(--navy-light);align-items:center;justify-content:center;border:1px solid var(--border);"><i class='ti ti-book' style='color:var(--navy-mid);font-size:1rem;'></i></div>`
          : `<div style="width:36px;height:50px;background:var(--navy-light);display:flex;align-items:center;justify-content:center;border:1px solid var(--border);"><i class='ti ti-book' style='color:var(--navy-mid);font-size:1rem;'></i></div>`;
        return `<tr>
          <td style="width:50px;">${coverHtml}</td>
          <td class="td-mono">${b.kodeBarang}</td>
          <td style="font-weight:600;min-width:160px;">${b.namaBarang}</td>
          <td><span class="badge badge-info">${b.jenisBarang}</span></td>
          <td class="td-mono">Ed. ${b.edisi}</td>
          <td class="td-mono">${b.kodeLokasi}</td>
          <td style="text-align:center;font-weight:700;font-family:var(--mono);">${b.stok}</td>
          <td><span class="badge ${st.cls}">${st.label}</span></td>
          <td><button class="btn btn-sm btn-danger" onclick="hapusBahan(${ri})"><i class="ti ti-trash"></i></button></td>
        </tr>`;
      }).join('');
    }

    function tambahBahan() {
      const kodeLokasi = document.getElementById('inputKodeLokasi').value.trim().toUpperCase();
      const kodeBarang = document.getElementById('inputKodeBarang').value.trim().toUpperCase();
      const namaBarang = document.getElementById('inputNama').value.trim();
      const edisi = document.getElementById('inputEdisi').value.trim();
      const stok = parseInt(document.getElementById('inputStok').value);
      const el = document.getElementById('alertForm');

      if (!kodeLokasi || !kodeBarang || !namaBarang || !edisi || isNaN(stok)) {
        showAlert(el, 'Semua field wajib diisi.', 'danger'); return;
      }
      if (bahanAjarList.find(b => b.kodeBarang === kodeBarang)) {
        showAlert(el, `Kode ${kodeBarang} sudah ada.`, 'danger'); return;
      }

      bahanAjarList.push({ kodeLokasi, kodeBarang, namaBarang, jenisBarang: 'BMP', edisi, stok, cover: '' });
      showAlert(el, `"${namaBarang}" berhasil ditambahkan.`, 'success');
      resetForm();
      renderTable();
    }

    function hapusBahan(idx) {
      if (!confirm(`Hapus "${bahanAjarList[idx].namaBarang}"?`)) return;
      bahanAjarList.splice(idx, 1);
      renderTable();
    }

    function resetForm() {
      ['inputKodeLokasi','inputKodeBarang','inputNama','inputEdisi','inputStok'].forEach(id => document.getElementById(id).value = '');
    }

    function showAlert(el, msg, type) {
      el.textContent = msg;
      el.className = `alert alert-${type} active`;
      setTimeout(() => el.classList.remove('active'), 4000);
    }

    function logout() { sessionStorage.clear(); location.href = 'index.html'; }
    renderTable();
  </script>
</body>
</html>
